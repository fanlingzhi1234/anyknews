name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "v*"
  workflow_dispatch:

jobs:
  verify:
    name: Verify AnyKnews
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify source catalog
        run: npx tsx scripts/verify-source-catalog.ts

      - name: Verify refresh policy
        run: npx tsx scripts/verify-refresh-policy.ts

      - name: Verify disk cache
        run: npx tsx scripts/verify-source-cache-store.ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Production release guard
        if: github.ref == 'refs/heads/main'
        run: scripts/guard-production-release.sh
