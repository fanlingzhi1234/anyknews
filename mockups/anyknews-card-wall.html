<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnyKnews Mock</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f4f5f7;
      --panel: #fff;
      --line: #e5e7eb;
      --text: #20242b;
      --muted: #697282;
      --subtle: #9aa2af;
      --brand: #e33c3c;
      --blue: #2563eb;
      --green: #159947;
      --amber: #d97706;
      --rose: #fb7185;
      --teal: #0f766e;
      --card-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-padding-top: 86px; }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--page);
      color: var(--text);
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 22px;
      min-height: 62px;
      padding: 0 26px;
      background: rgba(255, 255, 255, .94);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 8px rgba(15, 23, 42, .05);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 168px;
      font-size: 22px;
      font-weight: 850;
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 7px;
      background: var(--brand);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .nav {
      display: flex;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      padding: 8px 11px;
      border-radius: 7px;
      color: #545d6a;
      font-size: 15px;
      font-weight: 700;
    }

    .nav a:first-child {
      background: #f0f2f5;
      color: var(--text);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 188px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid #dbe3ed;
      border-radius: 7px;
      background: #f8fafc;
      color: #475569;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 99px;
      background: var(--green);
    }

    .icon-btn {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: #5f6673;
      font-size: 18px;
    }

    main {
      max-width: 1840px;
      margin: 0 auto;
      padding: 20px 26px 40px;
    }

    .board-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 14px;
      padding: 0 2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .board-meta strong {
      color: var(--text);
      font-size: 18px;
      font-weight: 850;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(316px, 1fr));
      grid-auto-flow: row dense;
      gap: 14px;
      align-items: start;
    }

    .source-card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 434px;
      max-height: 434px;
      overflow: hidden;
      scroll-margin-top: 86px;
      border: 1px solid #e8eaee;
      border-radius: var(--card-radius);
      background: var(--panel);
      box-shadow: 0 1px 2px rgba(15, 23, 42, .05);
    }

    .source-card.tall {
      min-height: 480px;
      max-height: 480px;
    }

    .source-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 11px 14px 8px;
    }

    .source-title {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .logo {
      display: grid;
      width: 27px;
      height: 27px;
      place-items: center;
      border-radius: 7px;
      color: #fff;
      font-size: 12px;
      font-weight: 850;
    }

    .logo.ai { background: var(--blue); }
    .logo.tech { background: #111827; }
    .logo.news { background: var(--brand); }
    .logo.biz { background: var(--teal); }
    .logo.ent { background: var(--rose); }
    .logo.fin { background: var(--amber); }
    .logo.car { background: #3b82f6; }

    .name-wrap { min-width: 0; }

    .source-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 19px;
      font-weight: 850;
      line-height: 1.1;
    }

    .category {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .board-name {
      align-self: end;
      padding-bottom: 3px;
      border-bottom: 2px solid #8d929a;
      color: #666b73;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .source-body {
      min-height: 0;
      overflow: hidden;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .list {
      height: 100%;
      margin: 0;
      padding: 8px 13px;
      overflow-y: auto;
      overscroll-behavior: contain;
      list-style: none;
      scrollbar-width: thin;
      scrollbar-color: #d2d6dc transparent;
    }

    .list::-webkit-scrollbar {
      width: 7px;
    }

    .list::-webkit-scrollbar-thumb {
      border-radius: 99px;
      background: #d2d6dc;
    }

    .item {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      min-height: 39px;
      padding: 5px 0;
    }

    .tall .item {
      min-height: 44px;
      padding: 6px 0;
    }

    .item + .item {
      border-top: 1px solid #f0f1f3;
    }

    .rank {
      padding-top: 1px;
      color: #9ca3af;
      font-size: 15px;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .rank.top1 { color: #ef4444; }
    .rank.top2 { color: #f59e0b; }
    .rank.top3 { color: #eab308; }

    .item-main { min-width: 0; }

    .item-title {
      display: block;
      color: #22262d;
      font-size: 13.6px;
      font-weight: 700;
      line-height: 1.32;
    }

    .item-summary {
      display: -webkit-box;
      margin-top: 2px;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .metric {
      padding-top: 2px;
      color: #858b95;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .source-foot {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      min-height: 42px;
      padding: 0 14px;
      color: #727984;
      font-size: 12px;
      font-weight: 650;
    }

    .foot-left {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .foot-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 16px;
    }

    @media (max-width: 920px) {
      .topbar {
        grid-template-columns: 1fr auto;
        height: auto;
        padding: 11px 14px 9px;
      }

      .brand { min-width: 0; }

      .nav {
        grid-column: 1 / -1;
        order: 3;
      }

      .actions { min-width: 0; }
      .status-pill { display: none; }

      main { padding: 16px 12px 32px; }

      .board-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }
    }

    @media (max-width: 560px) {
      .brand { font-size: 19px; }
      .brand-mark { width: 32px; height: 32px; font-size: 20px; }
      .board-meta { align-items: flex-start; flex-direction: column; gap: 4px; }
      .source-card, .source-card.tall { min-height: 448px; max-height: 448px; }
    }
  </style>

    function renderItem(item, index) {
      const [title, summary, metric] = item;
      const rankClass = index < 3 ? ` top${index + 1}` : "";
      return `
        <li class="item">
          <span class="rank${rankClass}">${index + 1}</span>
          <a class="item-main" href="#" title="${title}">
            <span class="item-title">${title}</span>
            <span class="item-summary">${summary}</span>
          </a>
          <span class="metric">${metric}</span>
        </li>
      `;
    }

    function renderCard(card) {
      return `
        <article class="source-card ${card.tall ? "tall" : ""}" id="${card.id}">
          <header class="source-head">
            <div class="source-title">
              <span class="logo ${card.logoClass}">${card.logo}</span>
              <div class="name-wrap">

              </div>
            </div>
            <div class="board-name">${card.board}</div>
          </header>
          <div class="source-body">
