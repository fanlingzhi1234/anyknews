services:
  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-mirror.gcr.io/library/node:22-alpine}
    container_name: anyknews-app
    restart: unless-stopped
    environment:
      ANYKNEWS_CACHE_TTL_SECONDS: ${ANYKNEWS_CACHE_TTL_SECONDS:-600}
      ANYKNEWS_ERROR_CACHE_TTL_SECONDS: ${ANYKNEWS_ERROR_CACHE_TTL_SECONDS:-120}
      ANYKNEWS_GITHUB_CACHE_TTL_SECONDS: ${ANYKNEWS_GITHUB_CACHE_TTL_SECONDS:-3600}
      ANYKNEWS_SOURCE_ITEM_LIMIT: ${ANYKNEWS_SOURCE_ITEM_LIMIT:-50}
      ANYKNEWS_ZHIHU_CACHE_TTL_SECONDS: ${ANYKNEWS_ZHIHU_CACHE_TTL_SECONDS:-120}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      RSSHUB_BASE_URL: ${RSSHUB_BASE_URL:-}
      TZ: ${TZ:-Asia/Shanghai}
      XUEQIU_COOKIE: ${XUEQIU_COOKIE:-}
      ZHIHU_COOKIE: ${ZHIHU_COOKIE:-}
      NOTIFICATION_API_TOKEN: ${NOTIFICATION_API_TOKEN:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      EMAIL_TO: ${EMAIL_TO:-}
      AI_DIGEST_SOURCE_LIMIT: ${AI_DIGEST_SOURCE_LIMIT:-4}
      AI_DIGEST_FEISHU_SOURCE_LIMIT: ${AI_DIGEST_FEISHU_SOURCE_LIMIT:-3}
    ports:
      - "3000:3000"
